<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="12" y="40" width="676" height="228" rx="4"/>
    </clipPath>
  </defs>

  <!-- Terminal window -->
  <rect width="700" height="280" rx="12" fill="url(#termBg)" stroke="#2d2d44" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="700" height="36" rx="12" fill="#16162a"/>
  <rect x="0" y="24" width="700" height="12" fill="#16162a"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="350" y="22" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">karartech  zsh  80×24</text>

  <!-- Screen content -->
  <g clip-path="url(#screenClip)" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
    <!-- Line 1: prompt -->
    <text x="20" y="62" fill="#22d3ee">o</text>
    <text x="36" y="62" fill="#a78bfa">whoami</text>
    
    <!-- Line 2: output -->
    <text x="20" y="84" fill="#94a3b8">
      <tspan fill="#e2e8f0">Haydar Al-Karar</tspan>
      <tspan fill="#64748b">  Full-Stack Developer @ </tspan>
      <tspan fill="#6366f1">Karar Tech</tspan>
    </text>

    <!-- Line 3: prompt -->
    <text x="20" y="112" fill="#22d3ee">o</text>
    <text x="36" y="112" fill="#a78bfa">cat skills.json</text>

    <!-- Line 4-6: JSON output with staggered reveal -->
    <text x="20" y="134" fill="#64748b">{</text>
    <text x="36" y="156" fill="#94a3b8">
      <tspan fill="#f472b6">"mobile"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#86efac">["React Native", "Expo", "Swift"]</tspan><tspan fill="#64748b">,</tspan>
    </text>
    <text x="36" y="178" fill="#94a3b8">
      <tspan fill="#f472b6">"web"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#86efac">["React", "Next.js", "TypeScript"]</tspan><tspan fill="#64748b">,</tspan>
    </text>
    <text x="36" y="200" fill="#94a3b8">
      <tspan fill="#f472b6">"backend"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#86efac">["Node.js", "Supabase", "PostgreSQL"]</tspan><tspan fill="#64748b">,</tspan>
    </text>
    <text x="36" y="222" fill="#94a3b8">
      <tspan fill="#f472b6">"ai"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#86efac">["OpenAI", "Deepgram", "Recall.ai"]</tspan>
    </text>
    <text x="20" y="244" fill="#64748b">}</text>

    <!-- Line 7: typing command -->
    <text x="20" y="266" fill="#22d3ee">o</text>
    <text x="36" y="266" fill="#a78bfa">
      npm run build
      <tspan fill="url(#cursorGrad)" filter="url(#termGlow)">Š</tspan>
    </text>
  </g>

  <!-- Blinking cursor animation -->
  <rect x="168" y="254" width="8" height="14" fill="url(#cursorGrad)" opacity="1" filter="url(#termGlow)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanline overlay for video effect -->
  <rect x="12" y="40" width="676" height="228" fill="none">
    <animate attributeName="opacity" values="0;0" dur="1s"/>
  </rect>
  <line x1="12" y1="40" x2="688" y2="40" stroke="#6366f1" stroke-width="0.5" opacity="0.1">
    <animate attributeName="y1" values="40;268;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="40;268;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.15;0" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
