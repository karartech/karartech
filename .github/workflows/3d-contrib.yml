name: Generate 3D Contribution

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: karartech

      - name: Commit 3D contribution assets
        run: |
          git config user.name "Karar Tech"
          git config user.email "Haydar.AlKararLLC@gmail.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || git commit -m "Update 3D contribution graph"
          git push
