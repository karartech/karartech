name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: karartech
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=6366f1&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=8b5cf6&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push to output branch
        run: |
          git config user.name "Karar Tech"
          git config user.email "Haydar.AlKararLLC@gmail.com"
          git checkout -B output
          git add dist/*
          git diff --staged --quiet || git commit -m "Update contribution snake"
          git push origin output --force
