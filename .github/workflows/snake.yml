name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: karartech
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          snake_color: "6366f1"

      - name: Push to output branch
        run: |
          git config user.name "Karar Tech"
          git config user.email "Haydar.AlKararLLC@gmail.com"
          git checkout -B output
          git add dist/*.svg
          git diff --staged --quiet || git commit -m "Update contribution snake"
          git push origin output --force
